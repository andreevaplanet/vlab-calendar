- name: Commit the update (only if it changed)
           run: |
             git config user.name  "vlab-calendar-bot"
             git config user.email "actions@users.noreply.github.com"
             git add events.xml
             if git diff --cached --quiet; then
               echo "No changes in the feed."
             else
               git commit -m "Update events feed"
               git push
             fi
